<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7b083"/>
      <stop offset="0.52" stop-color="#e8804f"/>
      <stop offset="1" stop-color="#c45e2c"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#3a1a0a" flood-opacity="0.32"/>
    </filter>
  </defs>
  <!-- warm squircle, brand orange -->
  <rect x="80" y="80" width="864" height="864" rx="200" fill="url(#bg)"/>
  <rect x="80" y="80" width="864" height="864" rx="200" fill="url(#sheen)"/>
  <rect x="81.5" y="81.5" width="861" height="861" rx="199" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="3"/>
  <!-- terminal prompt ›_ -->
  <g filter="url(#ds)">
    <path d="M398 376 L560 512 L398 648" fill="none" stroke="#ffffff" stroke-width="74" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="602" y="446" width="86" height="150" rx="22" fill="#ffffff"/>
  </g>
</svg>
