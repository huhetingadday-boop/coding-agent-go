name: build-release

# Builds the double-click installers (no terminal needed) and attaches them to
# the GitHub Release whenever a version tag is pushed. The piped one-liner stays
# the primary path; these binaries are the zero-terminal option for true
# non-technical users. Each artifact ships a SHA-256 so users can verify it.
#
# The apps embed a native webview (pywebview: WKWebView on macOS, WebView2 on
# Windows), so the UI opens in its own window — it feels like an app, not a
# browser tab, and closing the window quits cleanly.
#
#   Windows      -> coding-agent-go-windows.exe      (windowed, WebView2)
#   macOS arm64  -> coding-agent-go-macos-arm64.dmg  (Apple Silicon, .app)
#   macOS intel  -> coding-agent-go-macos-intel.dmg  (Intel x86_64, .app)
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
          - os: macos-latest      # Apple Silicon runner -> arm64 build
            target: macos-arm64
          - os: macos-13          # Intel runner -> x86_64 build
            target: macos-intel
    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build deps
        # pywebview pulls the platform webview backend (pyobjc on macOS,
        # pythonnet/WebView2 interop on Windows). PyInstaller bundles it.
        run: python -m pip install --upgrade pip pyinstaller pywebview
      - name: Build (embedded-webview app)
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then
            # --windowed = no console; one file. The UI is the WebView2 window.
            pyinstaller --onefile --windowed --name coding-agent-go \
              --add-data "providers.json;." server.py
          else
            # --windowed makes a real .app bundle so Finder runs it on double
            # click; the UI is the WKWebView window.
            pyinstaller --windowed --name coding-agent-go \
              --add-data "providers.json:." server.py
          fi
      - name: Package + checksum
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            mv coding-agent-go.exe coding-agent-go-windows.exe
            sha256sum coding-agent-go-windows.exe > coding-agent-go-windows.exe.sha256
          else
            # The app IS the installer (run-once: it installs the CLIs), so the
            # .dmg just holds the app to double-click — no drag-to-Applications
            # step. Name by arch ($TARGET = macos-arm64 | macos-intel) so both
            # can coexist on the release.
            dmg="coding-agent-go-${TARGET}.dmg"
            mkdir -p dmgroot
            cp -R coding-agent-go.app dmgroot/
            hdiutil create -volname "AI Coding Installer" -srcfolder dmgroot \
              -fs HFS+ -ov -format UDZO "$dmg"
            shasum -a 256 "$dmg" > "$dmg.sha256"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            dist/coding-agent-go-*.exe
            dist/coding-agent-go-*.dmg
            dist/*.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 \
            || gh release create "$tag" \
                 --title "$tag" --notes "Double-click installers for $tag. Verify with the matching .sha256 before running."
          gh release upload "$tag" artifacts/* --clobber
