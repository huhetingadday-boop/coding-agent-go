name: build-release

# Builds the double-click installers (no terminal needed) and attaches them to
# the GitHub Release whenever a version tag is pushed. The piped one-liner stays
# the primary path; these binaries are the zero-terminal option for true
# non-technical users. Each artifact ships a SHA-256 so users can verify it.
#
#   Windows -> coding-agent-go-windows.exe   (one-file console app)
#   macOS   -> coding-agent-go-macos.dmg     (.app bundle, drag to Applications)
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller
      - name: Build (Windows .exe / macOS .app)
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then
            # One-file console app: the console window doubles as a live log if
            # the browser fails to open.
            pyinstaller --onefile --name coding-agent-go \
              --add-data "providers.json;." server.py
          else
            # --windowed makes a real .app bundle so Finder runs it on double
            # click (a bare unix binary won't). server.py opens the browser
            # itself right after it binds the socket.
            pyinstaller --windowed --name coding-agent-go \
              --add-data "providers.json:." server.py
          fi
      - name: Package + checksum
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            mv coding-agent-go.exe coding-agent-go-windows.exe
            sha256sum coding-agent-go-windows.exe > coding-agent-go-windows.exe.sha256
          else
            # Wrap the .app in a .dmg with a drag-to-Applications shortcut — the
            # familiar macOS install gesture. Built on the Apple-Silicon runner,
            # so the .dmg targets M-series Macs; Intel users use the one-liner.
            mkdir -p dmgroot
            cp -R coding-agent-go.app dmgroot/
            ln -s /Applications dmgroot/Applications
            hdiutil create -volname "AI Coding Go" -srcfolder dmgroot \
              -fs HFS+ -ov -format UDZO coding-agent-go-macos.dmg
            shasum -a 256 coding-agent-go-macos.dmg > coding-agent-go-macos.dmg.sha256
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/coding-agent-go-*.exe
            dist/coding-agent-go-*.dmg
            dist/*.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 \
            || gh release create "$tag" \
                 --title "$tag" --notes "Double-click installers for $tag. Verify with the matching .sha256 before running."
          gh release upload "$tag" artifacts/* --clobber
