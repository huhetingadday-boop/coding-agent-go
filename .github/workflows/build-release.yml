name: build-release

# Builds the real desktop app (Electron, like Comet) and attaches it to the
# GitHub Release on a version tag. The install logic stays in Python (server.py),
# frozen by PyInstaller into a console "sidecar" binary; Electron spawns it in
# serve-only mode and shows its UI in a NATIVE Chromium window — no browser, no
# Python needed on the user's machine. electron-builder packages it as:
#
#   Windows -> coding-agent-go-windows.exe   (NSIS installer)
#   macOS   -> coding-agent-go-macos.dmg      (universal: Intel + Apple Silicon)
#
# Unsigned, so first open still needs the one-time Gatekeeper/SmartScreen allow.
# PAUSED: Electron packaging is on hold while we focus on the command-line
# install. The app/ shell and this pipeline are kept intact — to resume, restore
# the tag trigger below (and remove workflow_dispatch if you like):
#   on:
#     push:
#       tags: ['v*']
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
          - os: macos-latest      # Apple-Silicon runner; builds a universal app
            target: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'   # setup-python ships a universal2 CPython on macOS
      - name: Build the Python sidecar (PyInstaller, console)
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip pyinstaller
          mkdir -p app/sidecar
          if [ "$RUNNER_OS" = "Windows" ]; then
            pyinstaller --onefile --name server \
              --add-data "providers.json;." server.py
            cp dist/server.exe app/sidecar/server.exe
          else
            # universal2 so the one universal .dmg runs on Intel + Apple Silicon.
            pyinstaller --onefile --name server --target-arch universal2 \
              --add-data "providers.json:." server.py
            cp dist/server app/sidecar/server
            chmod +x app/sidecar/server
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build the Electron app
        shell: bash
        working-directory: app
        env:
          # No code-signing cert in CI — build unsigned (first-open allow stays).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          set -euo pipefail
          npm install
          npm run dist
      - name: Checksums
        shell: bash
        working-directory: app/dist
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then
            sha256sum coding-agent-go-windows.exe > coding-agent-go-windows.exe.sha256
          else
            shasum -a 256 coding-agent-go-macos.dmg > coding-agent-go-macos.dmg.sha256
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            app/dist/coding-agent-go-*.dmg
            app/dist/coding-agent-go-*.exe
            app/dist/*.sha256
          if-no-files-found: error

  release:
    needs: build
    # Publish whatever built, even if one OS leg failed — a Windows hiccup must
    # not hold back the macOS .dmg, and vice versa.
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ -z "$(ls -A artifacts 2>/dev/null)" ]; then
            echo "no build artifacts — every build leg failed"; exit 1
          fi
          ls -R artifacts
          gh release view "$tag" >/dev/null 2>&1 \
            || gh release create "$tag" \
                 --title "$tag" --notes "Native desktop app for $tag. Verify with the matching .sha256 before running."
          gh release upload "$tag" artifacts/* --clobber
